<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Characters — Fun-Gus: The Forest Has WiFi</title>
  <meta name="description" content="Meet 34+ characters across three biological kingdoms — fungi, bacteria, and insects — plus human kids and a secret faerie teacher.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .filter-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      border: 1px solid var(--border-accent);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'Fredoka', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--sillium-dim);
      border-color: var(--sillium);
      color: var(--sillium);
    }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }
    @media (max-width: 1024px) { .char-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) { .char-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .char-grid { grid-template-columns: 1fr; } }

    .char-card {
      background: var(--soil-600);
      border: 1px solid var(--border-accent);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
    }
    .char-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 0 25px var(--sillium-dim);
      transform: translateY(-3px);
    }
    .char-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--soil-700);
    }
    .char-card-body {
      padding: 1rem;
    }
    .char-card-body h3 {
      font-size: 1.05rem;
      margin-bottom: 0.2rem;
    }
    .char-card-body .species {
      font-size: 0.8rem;
      color: var(--sillium);
      font-style: italic;
    }
    .char-card-body .role {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.4rem;
    }
    .char-card-body .kingdom-tag {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tag-fungi { background: var(--sillium-dim); color: var(--sillium); }
    .tag-bacteria { background: rgba(139,92,246,0.15); color: #8b5cf6; }
    .tag-insect { background: var(--amber-dim); color: var(--amber); }
    .tag-human { background: rgba(236,72,153,0.15); color: #ec4899; }
    .placeholder-img {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, var(--soil-700), var(--soil-500));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      opacity: 0.3;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(4, 10, 7, 0.9);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-content {
      background: var(--soil-600);
      border: 1px solid var(--border-hover);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 60px var(--sillium-dim);
    }
    .modal-img {
      width: 100%;
      max-height: 350px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
    }
    .modal-body {
      padding: 2rem;
    }
    .modal-body h2 { margin-bottom: 0.25rem; }
    .modal-body .species { color: var(--sillium); font-style: italic; font-size: 0.95rem; }
    .modal-body .desc { color: var(--text-secondary); margin-top: 1rem; line-height: 1.7; }
    .modal-body .fact-box {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--sillium-dim);
      border-radius: 8px;
      border-left: 3px solid var(--sillium);
    }
    .modal-body .fact-box strong { color: var(--sillium); }
    .modal-body .fact-box p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.25rem; }
    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--soil-800);
      border: 1px solid var(--border-accent);
      color: var(--text-secondary);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <header id="site-nav"></header>

  <section class="page-hero container">
    <h1>Meet the Cast</h1>
    <p class="subtitle">34+ characters across three biological kingdoms &mdash; every one based on real biology.</p>
  </section>

  <section class="container" style="padding-bottom: 5rem;">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="fungi">Fungi</button>
      <button class="filter-btn" data-filter="bacteria">Bacteria</button>
      <button class="filter-btn" data-filter="insect">Insects</button>
      <button class="filter-btn" data-filter="human">Humans</button>
    </div>
    <div class="char-grid" id="char-grid"></div>
  </section>

  <!-- Modal -->
  <div class="modal-overlay" id="char-modal">
    <div class="modal-content" style="position: relative;">
      <button class="modal-close" id="modal-close">&times;</button>
      <img class="modal-img" id="modal-img" src="" alt="">
      <div class="modal-body">
        <h2 id="modal-name"></h2>
        <div class="species" id="modal-species"></div>
        <span class="kingdom-tag" id="modal-kingdom"></span>
        <div class="desc" id="modal-desc"></div>
        <div class="fact-box" id="modal-fact">
          <strong>Real Science</strong>
          <p id="modal-fact-text"></p>
        </div>
      </div>
    </div>
  </div>

  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
  <script src="js/characters.js"></script>
</body>
</html>
